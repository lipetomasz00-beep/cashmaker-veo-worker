name: Sprawdzanie bledow (Python Linter)

# Odpalaj ten skrypt automatycznie po każdym pushu do repozytorium
on: [push, pull_request]

jobs:
  check-code:
    runs-on: ubuntu-latest

    steps:
    - name: Pobranie kodu repozytorium
      uses: actions/checkout@v4

    - name: Instalacja Pythona
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Możesz zmienić na wersję, której używasz

    - name: Instalacja narzędzia flake8
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Szukanie krytycznych błędów w kodzie
      run: |
        # Ten krok zatrzyma się i wywali błąd na czerwono, jeśli znajdzie np. 
        # błędy składniowe (SyntaxError) lub użycie niezdefiniowanych zmiennych.
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
